# Pinned upstream versions for binaries vendored into the Ark bundle.
#
# A scheduled CI job (.github/workflows/vendor-freshness.yml) watches the
# repos listed under `sources` and opens a PR updating this file when a
# newer release is available. Edit the pinned `version` to upgrade -- the
# package-cli build will pick up the change on the next run.
#
# Format:
#   <name>:
#     repo: <owner>/<repo>              GitHub repo to poll
#     version: <tag>                    The current pin; scripts read this via env override
#     env: <VAR_NAME>                   The env var vendor-<name>.sh respects
#     platforms: [darwin-arm64, ...]    Platforms we vendor for
#     notes: optional free-text

goose:
  repo: block/goose
  version: v1.30.0
  env: GOOSE_VERSION
  platforms: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
  notes: "Block / Linux Foundation AAIF. Rust binary, pre-built per platform."
codex:
  repo: openai/codex
  version: rust-v0.121.0
  env: CODEX_VERSION
  platforms: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
  notes: "OpenAI Codex CLI. Rust binary; tags follow 'rust-vX.Y.Z' pattern."
tmux:
  repo: tmux/tmux
  version: "3.6a"
  env: TMUX_VERSION
  platforms: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
  notes: "Built from source (static libevent) rather than downloaded. Version pin in vendor-tmux.sh."
tensorzero:
  repo: tensorzero/tensorzero
  version: 2026.4.0
  env: TENSORZERO_REF
  platforms: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
  notes: "Built from HEAD of main via cargo. Pin a specific tag when stability becomes a concern."
codegraph:
  repo: optave/codegraph
  version: v3.9.3
  env: ""
  platforms: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
  notes: |
    DEPRECATED 2026-04-18. Superseded by codebase-memory-mcp (below).
    Extracted from @optave/codegraph-<arch> npm packages. Version
    tracked by package.json's bun lockfile, not this file. Keep entry
    until the deprecation migration lands + is verified in CI.

codebase-memory-mcp:
  repo: DeusData/codebase-memory-mcp
  version: v0.6.0
  env: CODEBASE_MEMORY_MCP_VERSION
  platforms: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
  notes: |
    Static C binary, MIT license, 66 tree-sitter grammars vendored in.
    Speaks MCP over stdio when invoked with no args. 14 tools including
    search_graph, trace_path, get_architecture, search_code, manage_adr,
    index_repository, index_status, detect_changes, manage_adr.
    Paper: arXiv:2603.27277 (10x fewer tokens, 2.1x fewer tool calls).
    LSP-style type resolution only for Go/C/C++; Python/JS/TS/Java rely
    on tree-sitter AST only (Good tier per upstream benchmarks).
    Ark exposes via .mcp.json entry at session dispatch for all runtimes.
    Design: docs/2026-04-18-CODE_INTELLIGENCE_DESIGN.md.
    Note: upstream asset names use -amd64 suffix; vendor-codebase-memory-mcp.sh
    maps Ark's -x64 platform label to upstream's -amd64.
