name: Release

on:
  push:
    tags: ['v*']
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            name: darwin-arm64
          - target: bun-darwin-x64
            name: darwin-x64
          - target: bun-linux-arm64
            name: linux-arm64
          - target: bun-linux-x64
            name: linux-x64

    runs-on: macos-latest
    name: build (${{ matrix.name }})
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Shim optional deps
        run: |
          mkdir -p node_modules/react-devtools-core
          cp shims/react-devtools-core.js node_modules/react-devtools-core/index.js
          echo '{"main":"index.js"}' > node_modules/react-devtools-core/package.json

      - name: Build binary
        run: |
          bun build --compile --target ${{ matrix.target }} \
            packages/cli/index.ts --outfile ark-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-${{ matrix.name }}
          path: ark-${{ matrix.name }}

  # Smoke-test binaries on native platforms
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-latest
          - name: darwin-x64
            os: macos-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    name: smoke-test (${{ matrix.name }})
    timeout-minutes: 5

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ark-${{ matrix.name }}

      - name: Make executable
        run: chmod +x ark-${{ matrix.name }}

      - name: Test CLI (--help)
        run: ./ark-${{ matrix.name }} --help

      - name: Test CLI (--version)
        run: ./ark-${{ matrix.name }} --version

      - name: Test TUI starts without crash
        run: |
          # CI has no TTY, so TUI correctly exits with "requires a terminal".
          # We just need to verify it doesn't segfault or fail to load modules.
          output=$(./ark-${{ matrix.name }} tui 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "requires a terminal"; then
            echo "TUI smoke test passed -- correct TTY check"
          elif echo "$output" | grep -q "Missing required tools"; then
            echo "TUI smoke test passed -- prereq check (expected for compiled binary)"
          elif echo "$output" | grep -qi "segfault\|cannot find module\|SyntaxError"; then
            echo "TUI smoke test FAILED -- unexpected error"
            exit 1
          else
            echo "TUI smoke test passed"
          fi

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build-flag: "--mac"
            name: mac
          - os: ubuntu-latest
            build-flag: "--linux"
            name: linux
          - os: windows-latest
            build-flag: "--win"
            name: win

    runs-on: ${{ matrix.os }}
    name: desktop (${{ matrix.name }})
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Build web frontend
        run: bun run packages/web/build.ts

      - name: Install Electron dependencies
        run: cd packages/desktop && npm install

      - name: Build Electron app
        run: cd packages/desktop && npx electron-builder ${{ matrix.build-flag }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-desktop-${{ matrix.name }}
          path: |
            packages/desktop/out/*.dmg
            packages/desktop/out/*.zip
            packages/desktop/out/*.exe
            packages/desktop/out/*.AppImage
            packages/desktop/out/*.deb

  release:
    needs: [build, smoke-test, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          for d in artifacts/ark-*/; do
            cp "$d"* dist/ 2>/dev/null || true
          done
          for d in artifacts/ark-desktop-*/; do
            cp "$d"* dist/ 2>/dev/null || true
          done
          chmod +x dist/ark-* 2>/dev/null || true
          ls -lh dist/

      - name: Determine release type
        id: release-type
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tagged release
        if: steps.release-type.outputs.is_tag == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ steps.release-type.outputs.tag }}" \
            --title "${{ steps.release-type.outputs.tag }}" \
            --generate-notes \
            dist/ark-*

      - name: Update latest release
        if: steps.release-type.outputs.is_tag == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Create release if it doesn't exist, then upload assets (clobber old ones)
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest \
              --title "Latest (rolling)" \
              --prerelease \
              --target "$COMMIT_SHA" \
              --notes "Rolling release from main."
          # Update release notes and upload new assets
          gh release edit latest \
            --title "Latest (rolling)" \
            --prerelease \
            --notes "Rolling release from main. Updated on every push.

          Install: \`curl -fsSL https://ytarasova.github.io/ark/install.sh | bash\`

          Commit: $COMMIT_SHA"
          gh release upload latest dist/ark-* --clobber
