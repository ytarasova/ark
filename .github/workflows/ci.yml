name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Unit tests (excludes E2E — those need real tmux + Claude)
        run: |
          bun test --timeout 30000 \
            $(find packages -name '*.test.ts' -o -name '*.test.tsx' | grep -v e2e | sort)
