name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tmux
        run: brew install tmux

      - name: Start tmux server
        run: tmux new-session -d -s ci-init

      - name: Install dependencies
        run: bun install

      - name: Build web frontend
        # packages/core/__tests__/web.test.ts serves packages/web/dist/index.html.
        # Locally `make test` depends on build-web; CI bypasses the Makefile,
        # so we must build the web dist here or the web server test flakes.
        run: cd packages/web && bunx --bun vite build --logLevel error

      - name: Lint
        # Use bunx --bun eslint to pin the version to whatever bun.lock
        # has installed. Plain `npx eslint` was pulling whatever ESLint
        # npx had cached (v10 on a fresh runner), which requires the new
        # flat config and breaks instantly on this legacy repo.
        run: bunx --bun eslint packages/ --max-warnings 50

      - name: Unit tests (excludes E2E and integration)
        run: |
          bun test --concurrency 1 --timeout 30000 \
            $(find packages -name '*.test.ts' -o -name '*.test.tsx' | grep -v e2e | grep -v local-arkd | grep -v local-provider | grep -v /dist/ | sort)

  # Build binaries for all 4 platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            name: darwin-arm64
          - target: bun-darwin-x64
            name: darwin-x64
          - target: bun-linux-arm64
            name: linux-arm64
          - target: bun-linux-x64
            name: linux-x64

    runs-on: macos-latest
    name: build (${{ matrix.name }})
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Shim optional deps
        run: |
          mkdir -p node_modules/react-devtools-core
          cp shims/react-devtools-core.js node_modules/react-devtools-core/index.js
          echo '{"main":"index.js"}' > node_modules/react-devtools-core/package.json

      - name: Build binary
        run: |
          bun build --compile --target ${{ matrix.target }} \
            packages/cli/index.ts --outfile ark-${{ matrix.name }}

      - name: Verify binary exists
        run: ls -lh ark-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-${{ matrix.name }}
          path: ark-${{ matrix.name }}

  # Smoke-test binaries on native platforms
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-latest
          - name: darwin-x64
            os: macos-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    name: smoke-test (${{ matrix.name }})
    timeout-minutes: 5

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ark-${{ matrix.name }}

      - name: Make executable
        run: chmod +x ark-${{ matrix.name }}

      - name: Test CLI (--help)
        run: ./ark-${{ matrix.name }} --help

      - name: Test CLI (--version)
        run: ./ark-${{ matrix.name }} --version

      - name: Test TUI starts without crash
        run: |
          # CI has no TTY, so TUI correctly exits with "requires a terminal".
          # We just need to verify it doesn't segfault or fail to load modules.
          output=$(./ark-${{ matrix.name }} tui 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "requires a terminal"; then
            echo "TUI smoke test passed -- correct TTY check"
          elif echo "$output" | grep -q "Missing required tools"; then
            echo "TUI smoke test passed -- prereq check (expected for compiled binary)"
          elif echo "$output" | grep -qi "segfault\|cannot find module\|SyntaxError"; then
            echo "TUI smoke test FAILED -- unexpected error"
            exit 1
          else
            echo "TUI smoke test passed"
          fi

  test-install-sh:
    name: install.sh regression tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run install tests
        run: make test-install

  web-e2e:
    runs-on: macos-latest
    timeout-minutes: 15
    continue-on-error: true  # WIP: fixtures use Bun APIs incompatible with Playwright/Node runner
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install tmux
        run: brew install tmux
      - name: Start tmux server
        run: tmux new-session -d -s ci-init
      - name: Install dependencies
        run: bun install
      - name: Install Playwright browsers
        # bunx --bun: the fixture (packages/e2e/fixtures/web-server.ts)
        # uses Bun APIs (`import { spawn } from "bun"`, `import.meta.dir`,
        # `Bun.sleep`) that the Node Playwright runner can't parse. Running
        # Playwright under Bun makes the imports resolve.
        run: cd packages/e2e && bun install && bunx --bun playwright install chromium
      - name: Run Web UI E2E tests
        run: cd packages/e2e && bunx --bun playwright test
