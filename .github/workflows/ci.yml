name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tmux
        run: brew install tmux

      - name: Install dependencies
        run: bun install

      - name: Unit tests (excludes E2E)
        run: |
          bun test --timeout 30000 \
            $(find packages -name '*.test.ts' -o -name '*.test.tsx' | grep -v e2e | sort)

  # Build binaries for all 4 platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            name: darwin-arm64
          - target: bun-darwin-x64
            name: darwin-x64
          - target: bun-linux-arm64
            name: linux-arm64
          - target: bun-linux-x64
            name: linux-x64

    runs-on: macos-latest
    name: build (${{ matrix.name }})
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Shim optional deps
        run: |
          mkdir -p node_modules/react-devtools-core
          cp shims/react-devtools-core.js node_modules/react-devtools-core/index.js
          echo '{"main":"index.js"}' > node_modules/react-devtools-core/package.json

      - name: Build binary
        run: |
          bun build --compile --target ${{ matrix.target }} \
            packages/cli/index.ts --outfile ark-${{ matrix.name }}

      - name: Verify binary exists
        run: ls -lh ark-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-${{ matrix.name }}
          path: ark-${{ matrix.name }}

  # Smoke-test binaries on native platforms
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-latest
          - name: darwin-x64
            os: macos-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    name: smoke-test (${{ matrix.name }})
    timeout-minutes: 5

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ark-${{ matrix.name }}

      - name: Make executable
        run: chmod +x ark-${{ matrix.name }}

      - name: Test CLI (--help)
        run: ./ark-${{ matrix.name }} --help

      - name: Test CLI (--version)
        run: ./ark-${{ matrix.name }} --version

      - name: Test TUI starts without crash
        run: |
          ./ark-${{ matrix.name }} tui &
          PID=$!
          sleep 3
          # If process is still running after 3s, TUI started successfully
          if kill -0 $PID 2>/dev/null; then
            echo "TUI smoke test passed — process running after 3s"
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
          else
            # Process exited — check if it crashed
            wait $PID 2>/dev/null
            code=$?
            if [ "$code" -eq 0 ]; then
              echo "TUI smoke test passed — exited cleanly"
            else
              echo "TUI smoke test FAILED (exit code: $code)"
              exit 1
            fi
          fi
