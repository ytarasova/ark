name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Full test suite on macOS (primary platform, has tmux)
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tmux
        run: brew install tmux

      - name: Install dependencies
        run: bun install

      - name: Unit tests (excludes E2E — those need real tmux + Claude)
        run: |
          bun test --timeout 30000 \
            $(find packages -name '*.test.ts' -o -name '*.test.tsx' | grep -v e2e | sort)

  # Build verification on Linux arm64 — catches install failures
  build-linux:
    runs-on: ubuntu-24.04-arm
    name: build (Linux arm64)
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Smoke test — CLI loads
        run: bun packages/cli/index.ts --help
