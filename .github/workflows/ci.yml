name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tmux
        run: brew install tmux

      - name: Start tmux server
        run: tmux new-session -d -s ci-init

      - name: Install dependencies
        run: bun install

      - name: Build web frontend
        # packages/core/__tests__/web.test.ts serves packages/web/dist/index.html.
        # Locally `make test` depends on build-web; CI bypasses the Makefile,
        # so we must build the web dist here or the web server test flakes.
        run: cd packages/web && bunx --bun vite build --logLevel error

      - name: Lint
        run: bunx --bun eslint packages/ --max-warnings 0

      - name: Format check
        run: bunx --bun prettier --check "packages/**/*.{ts,tsx,js,jsx,json,css}"

      # Dead-code scan: knip walks the entry chain declared in knip.json
      # and flags files / exports / dependencies that nothing reaches.
      # Non-blocking for now -- the config still has a few false positives
      # around html-entry tracing and binary-only deps. The output appears
      # in the CI log; convert to a hard failure once the report is
      # consistently empty across PRs.
      - name: Dead-code scan (knip)
        continue-on-error: true
        run: bunx --bun knip --reporter compact || true

      - name: Unit tests (excludes E2E and integration)
        # `--concurrency 4` matches `make test` locally (~7 min). The
        # previous `--concurrency 1` ran serially and consistently
        # exceeded the 15-min job timeout on macos-latest. Per CLAUDE.md
        # the suite is concurrency-4 safe -- each test file boots/teardown
        # its own AppContext via `forTestAsync()` with per-call ports +
        # arkDir, so workers don't collide.
        #
        # Bun exit-code quirk on macos-latest: bun occasionally exits 1
        # despite "0 fail" when a worker holds an open file descriptor at
        # process-end (tmux child, postgres connection, etc.). The local
        # `make test` (same command, same bun version) exits 0 with the
        # same test set. To avoid spurious CI red, gate the step on the
        # "X fail" line in bun's summary rather than the process exit
        # code. A real test failure still appears as "1 fail" / "5 fail"
        # in the output and fails the step.
        run: |
          set +e
          bun test --concurrency 4 --timeout 30000 \
            $(find packages -name '*.test.ts' -o -name '*.test.tsx' | grep -v e2e | grep -v local-arkd | grep -v local-provider | grep -v /dist/ | sort) 2>&1 | tee /tmp/bun-test.log
          BUN_EXIT=$?
          set -e
          if grep -qE '^\s*0 fail$' /tmp/bun-test.log; then
            echo "::notice::Test suite reports 0 fail (bun exited $BUN_EXIT). Treating as success."
            exit 0
          fi
          echo "::error::Test suite did not report '0 fail' (bun exit code $BUN_EXIT)."
          exit 1

  # Integration tests that need Docker (LocalStack-backed S3 round-trip).
  # macOS GitHub-hosted runners don't ship with Docker, so we run these on
  # ubuntu-latest where Docker is preinstalled. The test file skips cleanly
  # when Docker isn't available (dev laptops, non-Docker CI).
  integration-tests:
    name: integration (docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify Docker is available
        run: docker ps

      - name: Pre-pull LocalStack image
        run: docker pull localstack/localstack:3.8

      - name: LocalStack-backed S3 tests
        run: bun test packages/core/storage/__tests__/s3.test.ts --timeout 120000

  # Build binaries for all 4 platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            name: darwin-arm64
          - target: bun-darwin-x64
            name: darwin-x64
          - target: bun-linux-arm64
            name: linux-arm64
          - target: bun-linux-x64
            name: linux-x64

    runs-on: macos-latest
    name: build (${{ matrix.name }})
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun build --compile --target ${{ matrix.target }} \
            packages/cli/index.ts --outfile ark-${{ matrix.name }}

      - name: Verify binary exists
        run: ls -lh ark-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-${{ matrix.name }}
          path: ark-${{ matrix.name }}

  # Smoke-test binaries on native platforms
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-latest
          - name: darwin-x64
            os: macos-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    name: smoke-test (${{ matrix.name }})
    timeout-minutes: 5

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ark-${{ matrix.name }}

      - name: Make executable
        run: chmod +x ark-${{ matrix.name }}

      - name: Test CLI (--help)
        run: ./ark-${{ matrix.name }} --help

      - name: Test CLI (--version)
        run: ./ark-${{ matrix.name }} --version

  test-install-sh:
    name: install.sh regression tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build web frontend
        run: cd packages/web && bunx --bun vite build --logLevel error
      - name: Run install tests
        run: make test-install

  web-e2e:
    runs-on: macos-latest
    timeout-minutes: 15
    continue-on-error: true # WIP: fixtures use Bun APIs incompatible with Playwright/Node runner
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install tmux
        run: brew install tmux
      - name: Start tmux server
        run: tmux new-session -d -s ci-init
      - name: Install dependencies
        run: bun install
      - name: Install Playwright browsers
        # bunx --bun: the fixture (packages/e2e/fixtures/web-server.ts)
        # uses Bun APIs (`import { spawn } from "bun"`, `import.meta.dir`,
        # `Bun.sleep`) that the Node Playwright runner can't parse. Running
        # Playwright under Bun makes the imports resolve.
        run: cd packages/e2e && bun install && bunx --bun playwright install chromium
      - name: Run Web UI E2E tests
        run: cd packages/e2e && bunx --bun playwright test

  desktop-e2e:
    name: desktop-e2e (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # tmux is required by packages/core (session launcher imports it).
      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Install tmux + Electron runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libxkbcommon0 libasound2t64 || \
            sudo apt-get install -y tmux xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libxkbcommon0 libasound2

      - name: Start tmux server
        run: tmux new-session -d -s ci-init

      - name: Install repo dependencies
        run: bun install

      # Build the React SPA the desktop shell serves. Without this,
      # the Electron window loads a 404 and every test fails.
      - name: Build web frontend
        run: bun run build:web

      - name: Install desktop dependencies
        working-directory: packages/desktop
        run: npm install

      - name: Run Electron smoke tests (macOS)
        if: runner.os == 'macOS'
        working-directory: packages/desktop
        run: npm test

      - name: Run Electron smoke tests (Linux under xvfb)
        if: runner.os == 'Linux'
        working-directory: packages/desktop
        run: xvfb-run -a npm test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-${{ matrix.os }}
          path: |
            packages/desktop/test-results/
            packages/desktop/playwright-report/
          retention-days: 7

