name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tmux
        run: brew install tmux

      - name: Start tmux server
        run: tmux new-session -d -s ci-init

      - name: Install dependencies
        run: bun install

      - name: Build web frontend
        # packages/core/__tests__/web.test.ts serves packages/web/dist/index.html.
        # Locally `make test` depends on build-web; CI bypasses the Makefile,
        # so we must build the web dist here or the web server test flakes.
        run: cd packages/web && bunx --bun vite build --logLevel error

      - name: Lint
        run: bunx --bun eslint packages/ --max-warnings 0

      - name: Format check
        run: bunx --bun prettier --check "packages/**/*.{ts,tsx,js,jsx,json,css}"

      - name: Unit tests (excludes E2E and integration)
        run: |
          bun test --concurrency 1 --timeout 30000 \
            $(find packages -name '*.test.ts' -o -name '*.test.tsx' | grep -v e2e | grep -v local-arkd | grep -v local-provider | grep -v /dist/ | sort)

  # Build binaries for all 4 platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            name: darwin-arm64
          - target: bun-darwin-x64
            name: darwin-x64
          - target: bun-linux-arm64
            name: linux-arm64
          - target: bun-linux-x64
            name: linux-x64

    runs-on: macos-latest
    name: build (${{ matrix.name }})
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun build --compile --target ${{ matrix.target }} \
            packages/cli/index.ts --outfile ark-${{ matrix.name }}

      - name: Verify binary exists
        run: ls -lh ark-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-${{ matrix.name }}
          path: ark-${{ matrix.name }}

  # Smoke-test binaries on native platforms
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-latest
          - name: darwin-x64
            os: macos-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    name: smoke-test (${{ matrix.name }})
    timeout-minutes: 5

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ark-${{ matrix.name }}

      - name: Make executable
        run: chmod +x ark-${{ matrix.name }}

      - name: Test CLI (--help)
        run: ./ark-${{ matrix.name }} --help

      - name: Test CLI (--version)
        run: ./ark-${{ matrix.name }} --version

  test-install-sh:
    name: install.sh regression tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build web frontend
        run: cd packages/web && bunx --bun vite build --logLevel error
      - name: Run install tests
        run: make test-install

  web-e2e:
    runs-on: macos-latest
    timeout-minutes: 15
    continue-on-error: true # WIP: fixtures use Bun APIs incompatible with Playwright/Node runner
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install tmux
        run: brew install tmux
      - name: Start tmux server
        run: tmux new-session -d -s ci-init
      - name: Install dependencies
        run: bun install
      - name: Install Playwright browsers
        # bunx --bun: the fixture (packages/e2e/fixtures/web-server.ts)
        # uses Bun APIs (`import { spawn } from "bun"`, `import.meta.dir`,
        # `Bun.sleep`) that the Node Playwright runner can't parse. Running
        # Playwright under Bun makes the imports resolve.
        run: cd packages/e2e && bun install && bunx --bun playwright install chromium
      - name: Run Web UI E2E tests
        run: cd packages/e2e && bunx --bun playwright test

  desktop-e2e:
    name: desktop-e2e (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # tmux is required by packages/core (session launcher imports it).
      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Install tmux + Electron runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libxkbcommon0 libasound2t64 || \
            sudo apt-get install -y tmux xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libxkbcommon0 libasound2

      - name: Start tmux server
        run: tmux new-session -d -s ci-init

      - name: Install repo dependencies
        run: bun install

      # Build the React SPA the desktop shell serves. Without this,
      # the Electron window loads a 404 and every test fails.
      - name: Build web frontend
        run: bun run build:web

      - name: Install desktop dependencies
        working-directory: packages/desktop
        run: npm install

      - name: Run Electron smoke tests (macOS)
        if: runner.os == 'macOS'
        working-directory: packages/desktop
        run: npm test

      - name: Run Electron smoke tests (Linux under xvfb)
        if: runner.os == 'Linux'
        working-directory: packages/desktop
        run: xvfb-run -a npm test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-${{ matrix.os }}
          path: |
            packages/desktop/test-results/
            packages/desktop/playwright-report/
          retention-days: 7

  # Tauri desktop shell build (parallel to the Electron `desktop-e2e` job).
  # This job does NOT replace `desktop-e2e` or touch the release pipeline --
  # it just proves the Tauri scaffold compiles and produces installers on all
  # three target platforms. See packages/desktop-tauri/README.md.
  tauri-build:
    name: tauri-build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop-tauri/src-tauri/target
          key: tauri-${{ matrix.name }}-${{ hashFiles('packages/desktop-tauri/src-tauri/Cargo.toml') }}
          restore-keys: |
            tauri-${{ matrix.name }}-

      # Linux: Tauri v2 needs webkit2gtk + appindicator + a few X/GL libs to
      # link. See https://v2.tauri.app/start/prerequisites/#linux.
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install root dependencies
        run: bun install

      - name: Build web frontend
        # Tauri bundles ../../web/dist so the Vite build must succeed first.
        run: bun run build:web

      - name: Install Tauri package dependencies
        working-directory: packages/desktop-tauri
        run: bun install

      - name: Tauri build
        working-directory: packages/desktop-tauri
        env:
          CARGO_TERM_COLOR: always
        run: bun run build

      - name: Inventory bundle output
        shell: bash
        run: |
          echo "-- Tauri bundle artifacts --"
          find packages/desktop-tauri/src-tauri/target/release/bundle \
            -maxdepth 3 -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.deb' \
               -o -name '*.AppImage' -o -name '*.msi' -o -name '*.exe' \) \
            -exec ls -lh {} \; || true

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: |
            packages/desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
            packages/desktop-tauri/src-tauri/target/release/bundle/macos/*.app.tar.gz
            packages/desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            packages/desktop-tauri/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7
