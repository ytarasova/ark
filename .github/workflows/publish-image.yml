name: publish-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "package.json"
      - "bun.lock"
      - "packages/**"
      - "agents/**"
      - "flows/**"
      - "skills/**"
      - "recipes/**"
      - "ark"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag override (default: short SHA)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      INPUT_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tag-suffix
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ -n "${TAG_INPUT}" ]; then
            printf "value=%s\n" "${TAG_INPUT}" >> "$GITHUB_OUTPUT"
          else
            printf "value=\n" >> "$GITHUB_OUTPUT"
          fi

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.tag-suffix.outputs.value }},enable=${{ steps.tag-suffix.outputs.value != '' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
