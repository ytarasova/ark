name: Vendor Freshness

# Weekly freshness check for vendored upstream binaries. Polls GitHub
# releases for every entry in vendor/versions.yaml and opens a PR bumping
# the pin when upstream has a newer release. Every bump goes through a PR
# plus CI so a human can validate before merging.

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Check upstream releases and apply updates
        id: check
        run: |
          set -euo pipefail
          # Extract the list of names (top-level keys in the manifest).
          names=$(yq '. | keys | .[]' vendor/versions.yaml)
          outdated_names=""
          for name in $names; do
            repo=$(yq ".${name}.repo" vendor/versions.yaml)
            pinned=$(yq ".${name}.version" vendor/versions.yaml)
            if [ "$repo" = "null" ] || [ "$pinned" = "null" ]; then
              echo "  ${name}: skipped (no repo or version)"
              continue
            fi
            latest=$(gh release view -R "$repo" --json tagName --jq '.tagName' 2>/dev/null || echo "")
            if [ -z "$latest" ]; then
              echo "  ${name}: could not fetch latest from ${repo}"
              continue
            fi
            if [ "$latest" != "$pinned" ]; then
              echo "  ${name}: ${pinned} -> ${latest} (outdated)"
              yq -i ".${name}.version = \"${latest}\"" vendor/versions.yaml
              outdated_names="${outdated_names}${name} "
            else
              echo "  ${name}: ${pinned} (fresh)"
            fi
          done
          if [ -n "${outdated_names}" ]; then
            echo "outdated=true" >> "$GITHUB_OUTPUT"
            echo "names=${outdated_names}" >> "$GITHUB_OUTPUT"
          else
            echo "outdated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with version bumps
        if: steps.check.outputs.outdated == 'true'
        env:
          OUTDATED_NAMES: ${{ steps.check.outputs.names }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="vendor-freshness/$(date +%Y%m%d)"
          git checkout -b "${branch}"
          git add vendor/versions.yaml
          git commit -m "chore(vendor): refresh pinned binary versions"
          git push origin "${branch}"
          gh pr create \
            --title "chore(vendor): refresh pinned binary versions" \
            --body "Automated freshness check detected new upstream releases for: ${OUTDATED_NAMES}. Verify that \`make package-cli\` still produces working binaries on at least one platform, then merge when green." \
            --base main \
            --head "${branch}"
