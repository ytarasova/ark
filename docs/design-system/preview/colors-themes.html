<!doctype html><html class="midnight-circuit dark"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.theme-row { display:grid; grid-template-columns: 110px 1fr; gap:12px; align-items:center; margin-bottom:10px; }
.theme-label { font:600 12px/16px var(--font-sans); color: var(--fg); }
.theme-sub { font:400 10px/14px var(--font-mono-ui); color: var(--fg-muted); display:block; margin-top:2px; }
.preview-frame { display:flex; height: 72px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.pf-rail { width: 16%; display:flex; align-items:center; justify-content:center; }
.pf-list { width: 32%; padding:8px; display:flex; flex-direction:column; gap:4px; }
.pf-main { flex:1; padding:10px; display:flex; flex-direction:column; justify-content:center; gap:5px; }
.pf-dot { width:6px; height:6px; border-radius:99px; }
.pf-bar { height:4px; border-radius:2px; }
.pf-btn { display:inline-block; padding:3px 8px; border-radius:4px; font:600 9px var(--font-sans); }
</style></head>
<body><div class="card">
<div class="theme-row">
  <div><div class="theme-label">Midnight Circuit</div><span class="theme-sub">indigo · teal</span></div>
  <div class="preview-frame" style="background:#0c0c14;border-color:#252540">
    <div class="pf-rail" style="background:#0a0a12"><div class="pf-dot" style="background:#6b59de;box-shadow:0 0 6px #6b59de"></div></div>
    <div class="pf-list" style="background:#14141e;border-right:1px solid #252540">
      <div class="pf-bar" style="background:#252540;width:80%"></div>
      <div class="pf-bar" style="background:#6b59de;width:60%"></div>
      <div class="pf-bar" style="background:#252540;width:70%"></div>
    </div>
    <div class="pf-main"><div class="pf-bar" style="background:#e4e4ed;width:40%"></div><div class="pf-bar" style="background:#7878a0;width:65%"></div><span class="pf-btn" style="background:#6b59de;color:#fff;width:fit-content">Dispatch</span></div>
  </div>
</div>
<div class="theme-row">
  <div><div class="theme-label">Arctic Slate</div><span class="theme-sub">royal blue · slate</span></div>
  <div class="preview-frame" style="background:#09090b;border-color:#27272a">
    <div class="pf-rail" style="background:#09090b"><div class="pf-dot" style="background:#2563eb;box-shadow:0 0 6px #2563eb"></div></div>
    <div class="pf-list" style="background:#111113;border-right:1px solid #27272a">
      <div class="pf-bar" style="background:#27272a;width:80%"></div>
      <div class="pf-bar" style="background:#2563eb;width:60%"></div>
      <div class="pf-bar" style="background:#27272a;width:70%"></div>
    </div>
    <div class="pf-main"><div class="pf-bar" style="background:#ededf0;width:40%"></div><div class="pf-bar" style="background:#8a8a93;width:65%"></div><span class="pf-btn" style="background:#2563eb;color:#fff;width:fit-content">Dispatch</span></div>
  </div>
</div>
<div class="theme-row">
  <div><div class="theme-label">Warm Obsidian</div><span class="theme-sub">gold · obsidian</span></div>
  <div class="preview-frame" style="background:#0f0f0f;border-color:#2a2a2a">
    <div class="pf-rail" style="background:#0c0c0c"><div class="pf-dot" style="background:#d4a847;box-shadow:0 0 6px #d4a847"></div></div>
    <div class="pf-list" style="background:#191919;border-right:1px solid #2a2a2a">
      <div class="pf-bar" style="background:#2a2a2a;width:80%"></div>
      <div class="pf-bar" style="background:#d4a847;width:60%"></div>
      <div class="pf-bar" style="background:#2a2a2a;width:70%"></div>
    </div>
    <div class="pf-main"><div class="pf-bar" style="background:#ededed;width:40%"></div><div class="pf-bar" style="background:#878787;width:65%"></div><span class="pf-btn" style="background:#d4a847;color:#0f0f0f;width:fit-content">Dispatch</span></div>
  </div>
</div>
</div></body></html>
