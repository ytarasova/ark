<!doctype html><html class="midnight-circuit dark"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.hero { display:flex; align-items:center; gap:24px; padding:28px 24px; background: var(--bg-card); border: 1px solid var(--border); border-radius:12px; }
.mark { width:96px; height:96px; display:grid; place-items:center; background: var(--bg); border-radius:16px; border: 1px solid var(--border); }
.mark img { width:72px; height:72px; }
.wordmark { font: 700 56px/1 var(--font-sans); letter-spacing:-0.025em; background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
.tag { font: 400 13px/20px var(--font-sans); color: var(--fg-muted); margin-top:4px; max-width: 340px; }
.meta { font: 500 10px/14px var(--font-mono-ui); color: var(--fg-muted); text-transform:uppercase; letter-spacing:0.06em; }
</style></head>
<body>
<div class="hero">
  <div class="mark"><img src="../assets/ark-icon.png" alt="Ark"></div>
  <div>
    <div class="meta">The orchestration layer</div>
    <div class="wordmark">ark</div>
    <div class="tag">Ship code with AI agents, not just copilots. Ark drives Claude, Codex, Gemini through multi-stage SDLC pipelines.</div>
  </div>
</div>
</body></html>
