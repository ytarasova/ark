<!doctype html><html class="midnight-circuit dark"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
body { padding: 18px 20px; }
.card { gap: 14px; }
.row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.lab { width: 90px; font: 500 10px var(--font-mono-ui); color: var(--fg-muted); text-transform:uppercase; letter-spacing:0.05em; }

/* ── status pills ─ subtle gloss + glowing live dot ─ */
.badge {
  display:inline-flex; align-items:center; gap:6px;
  height:22px; padding:0 9px;
  border-radius:99px;
  font:500 11px/1 var(--font-sans);
  border:1px solid transparent;
  box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 1px 1.5px rgba(0,0,0,.25);
}
.dot { width:6px; height:6px; border-radius:99px; flex-shrink: 0; }

.badge.running { background: linear-gradient(180deg, rgba(96,165,250,.16), rgba(96,165,250,.06)); color:#7dbbff; border-color: rgba(96,165,250,.32); }
.badge.running .dot { background:#60a5fa; box-shadow:0 0 5px rgba(96,165,250,.6); }

.badge.waiting { background: linear-gradient(180deg, rgba(251,191,36,.13), rgba(251,191,36,.04)); color:#fbbf24; border-color: rgba(251,191,36,.3); }
.badge.waiting .dot { background:#fbbf24; }

.badge.completed { background: linear-gradient(180deg, rgba(52,211,153,.13), rgba(52,211,153,.04)); color:#34d399; border-color: rgba(52,211,153,.3); }
.badge.completed .dot { background:#34d399; }

.badge.failed { background: linear-gradient(180deg, rgba(248,113,113,.13), rgba(248,113,113,.04)); color:#f87171; border-color: rgba(248,113,113,.32); }
.badge.failed .dot { background:#f87171; }

.badge.stopped { background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.08)); color: var(--fg-muted); border-color: var(--border); }
.badge.stopped .dot { background: rgba(156,163,175,.4); }

/* ── tag chips ─ subtle gloss, tangible ─ */
.rt {
  display:inline-flex; align-items:center; gap:6px;
  height:22px; padding:0 9px;
  border-radius:5px;
  font:500 10px/1 var(--font-mono-ui);
  background: linear-gradient(180deg, #222238 0%, #1a1a2b 100%);
  color: var(--fg);
  border:1px solid var(--border);
  text-transform:uppercase; letter-spacing:.05em;
  box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 1px 1.5px rgba(0,0,0,.25);
}
.rt.primary {
  background: linear-gradient(180deg, rgba(139,122,255,.25), rgba(107,89,222,.12));
  color: #b0a3ff;
  border-color: rgba(107,89,222,.35);
}
</style></head><body><div class="card">

<div class="row"><span class="lab">state</span>
  <span class="badge running"><span class="dot"></span>running</span>
  <span class="badge waiting"><span class="dot"></span>waiting</span>
  <span class="badge completed"><span class="dot"></span>completed</span>
  <span class="badge failed"><span class="dot"></span>failed</span>
  <span class="badge stopped"><span class="dot"></span>stopped</span>
</div>

<div class="row"><span class="lab">runtime</span>
  <span class="rt">claude</span>
  <span class="rt">claude-max</span>
  <span class="rt">codex</span>
  <span class="rt">gemini</span>
  <span class="rt">goose</span>
</div>

<div class="row"><span class="lab">agent</span>
  <span class="rt primary">implementer</span>
  <span class="rt primary">verifier</span>
  <span class="rt primary">spec-planner</span>
  <span class="rt primary">reviewer</span>
</div>

<div class="row"><span class="lab">compute</span>
  <span class="rt" style="text-transform:none">local</span>
  <span class="rt" style="text-transform:none">docker</span>
  <span class="rt" style="text-transform:none">ec2</span>
  <span class="rt" style="text-transform:none">k8s</span>
  <span class="rt" style="text-transform:none">firecracker</span>
</div>

</div></body></html>
