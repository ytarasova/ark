<!doctype html><html class="midnight-circuit dark"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
body { padding: 20px; font-family: var(--font-sans); }
.card { gap: 16px; }

.rail-wrap {
  display: flex; gap: 18px; align-items: flex-start;
}
.rail {
  width: 60px; height: 600px;
  background: var(--bg-sidebar);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 0 10px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  box-shadow: inset -1px 0 0 rgba(255,255,255,.02), 0 2px 6px rgba(0,0,0,.3);
}
.rail .brand {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--gradient-brand);
  display: grid; place-items: center;
  font: 700 15px var(--font-mono-ui); color: #fff;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(107,89,222,.4), 0 0 0 1px rgba(255,255,255,.1) inset;
}
.rail .sep { width: 24px; height: 1px; background: var(--border); margin: 6px 0; }
.rail .btn {
  width: 36px; height: 36px; border-radius: 7px;
  display: grid; place-items: center;
  color: var(--fg-muted);
  cursor: pointer;
  position: relative;
  transition: background 120ms, color 120ms;
}
.rail .btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.rail .btn:hover { background: var(--bg-hover); color: var(--fg); }
.rail .btn.on {
  background: var(--primary-subtle);
  color: var(--fg);
}
.rail .btn.on::before {
  content: ''; position: absolute; left: -12px; top: 8px; bottom: 8px;
  width: 2px; background: var(--primary); border-radius: 0 2px 2px 0;
  box-shadow: 0 0 6px rgba(107,89,222,.6);
}
.rail .btn .dot {
  position: absolute; top: 4px; right: 4px;
  width: 7px; height: 7px; border-radius: 99px;
  background: #f87171; box-shadow: 0 0 0 2px var(--bg-sidebar), 0 0 4px rgba(248,113,113,.6);
}
.rail .btn .badge {
  position: absolute; top: -3px; right: -4px;
  min-width: 15px; height: 15px; padding: 0 4px; border-radius: 99px;
  background: var(--primary); color: var(--primary-fg);
  font: 600 9px var(--font-mono-ui);
  display: grid; place-items: center;
  box-shadow: 0 0 0 2px var(--bg-sidebar), 0 1px 2px rgba(0,0,0,.4);
}
.rail .spacer { flex: 1; }
.rail .avatar {
  width: 32px; height: 32px; border-radius: 99px;
  background: linear-gradient(135deg, #f59e0b, #ec4899);
  display: grid; place-items: center;
  font: 600 12px var(--font-mono-ui); color: #fff;
  border: 2px solid var(--bg-sidebar);
  position: relative;
  margin-top: 4px;
}
.rail .avatar::after {
  content: ''; position: absolute; bottom: -1px; right: -1px;
  width: 9px; height: 9px; border-radius: 99px;
  background: #34d399; box-shadow: 0 0 4px rgba(52,211,153,.6), 0 0 0 2px var(--bg-sidebar);
}

/* Key / legend column */
.key { display: flex; flex-direction: column; gap: 12px; flex: 1; padding-top: 4px; }
.key .item { display: flex; align-items: center; gap: 10px; font: 500 12px var(--font-sans); color: var(--fg); }
.key .item .tag {
  font: 500 10px var(--font-mono-ui); color: var(--fg-faint);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-left: auto;
}
.key h4 {
  margin: 14px 0 2px; font: 600 10px var(--font-mono-ui); color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.key h4:first-child { margin-top: 0; }
</style></head>
<body>
<div class="card">

  <div class="rail-wrap">
    <div class="rail">
      <div class="brand">A</div>

      <div class="btn on" title="Sessions">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="btn" title="Flows">
        <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="12" r="2.5"/><circle cx="6" cy="18" r="2.5"/><path d="M8.5 6 L15.5 11"/><path d="M8.5 18 L15.5 13"/></svg>
      </div>
      <div class="btn" title="Agents">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20c0-3 2.5-5.5 6-5.5S18 17 18 20"/></svg>
        <span class="badge">4</span>
      </div>
      <div class="btn" title="Knowledge">
        <svg viewBox="0 0 24 24"><path d="M4 6c3 0 6 1 8 2 2-1 5-2 8-2v13c-3 0-6 1-8 2-2-1-5-2-8-2z"/></svg>
      </div>

      <div class="sep"></div>

      <div class="btn" title="Compute">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/><circle cx="7" cy="7" r=".5" fill="currentColor"/><circle cx="7" cy="17" r=".5" fill="currentColor"/></svg>
      </div>
      <div class="btn" title="Router">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="dot"></span>
      </div>
      <div class="btn" title="Logs">
        <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </div>

      <div class="spacer"></div>

      <div class="btn" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.37.15.71.37 1 .64"/></svg>
      </div>
      <div class="avatar">YT</div>
    </div>

    <div class="key">
      <h4>Geometry</h4>
      <div class="item">Width<span class="tag">60px fixed</span></div>
      <div class="item">Icon button<span class="tag">36 × 36 · r7</span></div>
      <div class="item">Icon glyph<span class="tag">18px · stroke 1.75</span></div>

      <h4>States</h4>
      <div class="item">Default<span class="tag">fg-muted</span></div>
      <div class="item">Hover<span class="tag">bg-hover · fg</span></div>
      <div class="item">Active<span class="tag">primary-subtle + rail</span></div>

      <h4>Overlays</h4>
      <div class="item">Notification<span class="tag">dot · failed · 7px</span></div>
      <div class="item">Counter badge<span class="tag">primary · 15px · offset</span></div>
      <div class="item">Presence<span class="tag">on avatar · 9px</span></div>
    </div>
  </div>

</div>
</body></html>
