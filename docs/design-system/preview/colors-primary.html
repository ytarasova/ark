<!doctype html><html class="midnight-circuit dark"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:8px; }
.sw { aspect-ratio: 1; border-radius:8px; border:1px solid var(--border); display:flex; flex-direction:column; justify-content:flex-end; padding:6px; font: 500 9px/12px var(--font-mono-ui); color: var(--fg); }
.sw .h { font-size:8px; opacity:0.7; font-family: var(--font-mono-ui); }
.ramp { display:flex; gap:2px; height: 32px; margin-bottom:6px; }
.ramp > div { flex:1; border-radius:3px; }
.title { font:600 12px/16px var(--font-sans); color: var(--fg); margin-bottom:4px; }
.section { margin-bottom:12px; }
</style></head>
<body><div class="card">
<div class="section">
  <div class="title">Primary · indigo</div>
  <div class="ramp">
    <div style="background:#efeefc"></div><div style="background:#d9d4f7"></div><div style="background:#b6aaf0"></div>
    <div style="background:#9180e8"></div><div style="background:#6b59de"></div><div style="background:#5547c4"></div>
    <div style="background:#40369a"></div><div style="background:#2b2670"></div><div style="background:#181545"></div>
  </div>
</div>
<div class="section">
  <div class="title">Neutral · ink</div>
  <div class="ramp">
    <div style="background:#f8f8fc"></div><div style="background:#ededf5"></div><div style="background:#dcdce8"></div>
    <div style="background:#a8a8c0"></div><div style="background:#7878a0"></div><div style="background:#5a5a78"></div>
    <div style="background:#3a3a54"></div><div style="background:#252540"></div><div style="background:#14141e"></div>
  </div>
</div>
<div class="section">
  <div class="title">Accent · teal (pairs with primary for gradient)</div>
  <div class="ramp">
    <div style="background:#eefcfd"></div><div style="background:#cdf4f7"></div><div style="background:#86dbe4"></div>
    <div style="background:#2cbcc9"></div><div style="background:#06b6d4"></div><div style="background:#0891a4"></div>
    <div style="background:#0e7490"></div><div style="background:#155366"></div><div style="background:#0c2d38"></div>
  </div>
</div>
</div></body></html>
