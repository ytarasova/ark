<!doctype html>
<html lang="en" class="midnight-circuit dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ark — Architecture</title>
  <link rel="stylesheet" href="../_docs.css" />
  <style>
    .flow-diagram {
      display: grid; grid-template-columns: 1fr 40px 1fr 40px 1fr;
      align-items: center; gap: 0; padding: 28px 24px;
      background: var(--doc-surface); border: 1px solid var(--doc-border);
      border-radius: 12px; max-width: 760px; margin: 48px auto;
    }
    .flow-diagram .node {
      padding: 14px 12px; border-radius: 8px;
      background: var(--doc-surface-2); border: 1px solid var(--doc-border);
      text-align: center;
    }
    .flow-diagram .node .n-label {
      font: 500 10px var(--font-mono-ui); color: var(--doc-fg-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px;
    }
    .flow-diagram .node .n-name {
      font: 600 14px var(--font-sans); color: var(--doc-fg-strong);
    }
    .flow-diagram .node.primary {
      background: var(--primary-subtle); border-color: rgba(107,89,222,.3);
    }
    .flow-diagram .node.primary .n-label { color: var(--primary); }
    .flow-diagram .arrow {
      display: flex; align-items: center; justify-content: center;
      color: var(--doc-fg-muted);
    }
    .flow-diagram .arrow svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  </style>
</head>
<body data-root="../" data-nav="home">

<div data-slot="topbar"></div>

<section class="section">
  <div class="section-head">
    <div class="eyebrow">architecture</div>
    <h2>Three components.<br>One protocol between them.</h2>
    <p>The conductor plans and schedules. The daemon executes on any compute. The runtime is your agent of choice. Everything else is pluggable.</p>
  </div>

  <div class="flow-diagram">
    <div class="node primary">
      <div class="n-label">conductor</div>
      <div class="n-name">:19100</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14m-6-6 6 6-6 6"/></svg></div>
    <div class="node">
      <div class="n-label">arkd daemon</div>
      <div class="n-name">:19300</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14m-6-6 6 6-6 6"/></svg></div>
    <div class="node">
      <div class="n-label">agent runtime</div>
      <div class="n-name">claude · codex · …</div>
    </div>
  </div>
</section>

<script src="../_docs.js"></script>
</body>
</html>
