name: islc
description: "Intent-to-Software Lifecycle -- full pipeline from Jira ticket to merged PR with for-each execution"
requires_repo: truestages:
  - name: ticket-intake
    agent: ticket-intake
    gate: auto
    task: |
      Process Jira ticket {{ticket}}. Run sanity gate and extract 27-section spec.
      Write artifacts to {{workdir}}/.workflow/{{ticket}}/

  - name: plan
    agent: spec-planner
    gate: manual
    depends_on: [ticket-intake]
    task: |
      Read spec from {{workdir}}/.workflow/{{ticket}}/spec.md.
      Decompose into subtasks, create Jira sub-tasks.

  - name: audit
    agent: plan-auditor
    gate: auto
    depends_on: [plan]
    optional: true
    task: |
      Audit plan coverage against spec. Write audit-report.md.

  - name: execute
    for_each: "{{subtasks}}"
    mode: spawn
    iteration_var: subtask
    gate: auto
    depends_on: [audit]
    # max_parallel removed -- for_each + spawn is sequential-only
    spawn:
      flow: islc-execute-subtask
      inputs:
        summary: "{{subtask.summary}}"
        agent: task-implementer

  - name: verify
    agent: verifier
    gate: manual
    depends_on: [execute]
    verify:
      - "npm test"
      - "npm run lint"
    task: |
      Run verification layers. Write verify-report.md.

  - name: close
    agent: closer
    gate: auto
    depends_on: [verify]
    task: |
      Create PR, transition Jira, publish Confluence.

  - name: retro
    agent: retro
    gate: auto
    depends_on: [close]
    optional: true
    task: |
      Analyse workflow run. Write retro-report.md.
