name: quick
description: "Quick flow: implement -> verify -> PR (no planning, no review)"
stages:
  - name: implement
    agent: implementer
    gate: auto
    on_failure: "retry(3)"

  - name: verify
    agent: verifier
    gate: auto
    depends_on: [implement]

  - name: pr
    action: create_pr
    gate: auto
    depends_on: [verify]
