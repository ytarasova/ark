name: docs
description: "Lightweight flow for documentation: plan -> implement -> PR. No verify/review -- docs don't need test suites or code review."
requires_repo: true
stages:
  - name: plan
    agent: planner
    gate: auto

  - name: implement
    agent: worker
    gate: auto
    depends_on: [plan]
    on_failure: "retry(1)"

  - name: pr
    agent: pr-handler
    gate: auto
    depends_on: [implement]
