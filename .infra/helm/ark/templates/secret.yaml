{{- if not .Values.llm.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ark.fullname" . }}-llm
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ark.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.llm.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.llm.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.googleApiKey }}
  GOOGLE_API_KEY: {{ .Values.llm.googleApiKey | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.postgresql.enabled (not .Values.postgresql.external.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ark.fullname" . }}-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ark.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "ark.databaseUrl" . | quote }}
{{- end }}
