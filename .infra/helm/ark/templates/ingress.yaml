{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ark.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ark.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket support: nginx-ingress handles Upgrade/Connection headers
    # natively when proxy-http-version is 1.1. Avoids configuration-snippet
    # which is rejected when allow-snippet-annotations=false.
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ark.fullname" . }}-control-plane
                port:
                  name: web
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "ark.fullname" . }}-control-plane
                port:
                  name: web
{{- end }}
