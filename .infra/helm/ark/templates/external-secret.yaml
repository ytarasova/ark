{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "ark.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ark.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName | default "aws-secretstore" }}
    kind: {{ .Values.externalSecret.storeKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "ark.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- /* App secrets (LLM keys, OAuth, webhook signing, etc.) live in one Secrets Manager entry. */ -}}
    {{- range $key := .Values.externalSecret.appSecrets }}
    - secretKey: {{ $key | quote }}
      remoteRef:
        key: {{ $.Values.externalSecret.appSecretPath | quote }}
        property: {{ $key | quote }}
    {{- end }}
    {{- /* RDS-managed secret -- AWS auto-rotates username + password. */ -}}
    {{- if .Values.database.secretArn }}
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.database.secretArn | quote }}
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.database.secretArn | quote }}
        property: password
    {{- end }}
{{- end }}
