# Ark -- Docker Compose for hosted deployment
#
# Services:
#   ark      - Ark server (web UI + conductor + API)
#   postgres - PostgreSQL 16 database
#   redis    - Redis 7 (session cache, pub/sub for multi-instance)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f ark

version: "3.8"

services:
  ark:
    build: .
    command: ["bun", "packages/cli/index.ts", "server", "start", "--hosted"]
    ports:
      - "8420:8420"     # Web UI
      - "19100:19100"   # Conductor
      - "8430:8430"     # LLM Router
    environment:
      - DATABASE_URL=postgres://ark:ark@postgres:5432/ark
      - REDIS_URL=redis://redis:6379
      - ARK_CONDUCTOR_HOST=0.0.0.0
      - ARK_AUTH_ENABLED=true
      - ARK_TENSORZERO_URL=http://tensorzero:3000
      - ARK_TENSORZERO_ENABLED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tensorzero:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ark-data:/root/.ark

  worker:
    build: .
    command: ["bun", "packages/cli/index.ts", "arkd", "--conductor-url", "http://ark:19100"]
    environment:
      - ARK_CONTROL_PLANE_URL=http://ark:19100
    depends_on:
      - ark
    restart: unless-stopped
    deploy:
      replicas: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ark
      POSTGRES_PASSWORD: ark
      POSTGRES_DB: ark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ark"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis-data:/data

  tensorzero:
    image: tensorzero/gateway
    volumes:
      - tensorzero-config:/app/config
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/status"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:
  ark-data:
  tensorzero-config:
