name: goose
description: "Goose -- open-source AI agent from Block / Linux Foundation AAIF"
type: goose
command: ["goose", "run"]
task_delivery: arg
models:
  - id: claude-sonnet-4-6
    label: "Claude Sonnet 4.6 (via router)"
  - id: claude-opus-4-6
    label: "Claude Opus 4.6 (via router)"
  - id: gpt-5-codex
    label: "GPT-5 Codex (via router)"
  - id: gemini-2.5-pro
    label: "Gemini 2.5 Pro (via router)"
default_model: claude-sonnet-4-6
billing:
  mode: api
  transcript_parser: goose
task_prompt: |

  When you finish, stop with a final assistant message that summarizes what you accomplished (files changed, tests added, key decisions). The UI picks up that summary automatically. Do not invent a "report" tool -- you don't have one.
