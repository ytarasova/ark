# Ark -- Kubernetes Ingress
#
# Routes external traffic to the Ark web UI.
# Adjust the host and TLS settings for your domain.
#
# Prerequisites:
#   - An Ingress controller (nginx-ingress, traefik, etc.)
#   - A TLS certificate (cert-manager recommended)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ark
  labels:
    app: ark
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Enable WebSocket support for real-time updates
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ark.example.com
      secretName: ark-tls
  rules:
    - host: ark.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ark
                port:
                  name: web
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ark
                port:
                  name: web
