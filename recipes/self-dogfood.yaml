name: self-dogfood
description: |
  Dispatch an ark agent to work on the ark repo itself using the full
  autonomous SDLC flow: plan -> implement -> review -> PR.

  Each stage runs a specialized agent (planner, implementer, reviewer)
  and auto-advances on completion. No human intervention needed.

  Typical invocation:
    ark session start --recipe self-dogfood \
      --summary "add health-check endpoint to the web server" \
      --dispatch

  Or via the Makefile shortcut:
    make self TASK="add health-check endpoint to the web server"

  For quick single-agent tasks (docs, config, trivial fixes), use:
    make self-quick TASK="update the roadmap"

  The agent runs inside an isolated git worktree, creates atomic
  commits, runs tests, and auto-creates a PR against main.

repo: "."
flow: autonomous-sdlc

variables:
  - name: summary
    description: What the agent should do -- scoped, concrete, one-sentence
    required: true
