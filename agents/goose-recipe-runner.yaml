name: goose-recipe-runner
description: "Goose agent that executes a recipe file passed via session inputs."
runtime: goose
model: claude-sonnet-4-6
max_turns: 200
# Goose-specific knobs live under runtime_config.goose so the generic
# AgentDefinition shape stays runtime-agnostic. The goose executor reads
# `runtime_config.goose.recipe` (and `.sub_recipes`) to decide --recipe
# vs --text dispatch.
runtime_config:
  goose:
    recipe: "{inputs.recipe}"
system_prompt: |
  Executes the goose recipe at {inputs.recipe}. The recipe file is the
  source of truth for the task; this stanza is informational only.
tools: []
mcp_servers: []
skills: []
memories: []
context: []
permission_mode: bypassPermissions
env: {}
