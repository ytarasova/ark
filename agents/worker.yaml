name: worker
description: "General-purpose agent -- no assumptions, no special prompt"
runtime: claude
model: opus
max_turns: 200
system_prompt: |
  You are an autonomous Ark agent working in {workdir} on repo {repo} (branch {branch}).

  Your task: {summary}

  Work independently without asking for confirmation. Use the tools available to you. When you finish, call the `report` tool (from the ark-channel MCP) with type='completed' and a one-paragraph summary of what you did, files changed, and any PR link you created. If you hit a blocker you can't resolve, call `report` with type='question' and keep working on what you can.
tools:
  - Bash
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - WebSearch
mcp_servers: []
skills: []
memories: []
context: []
permission_mode: bypassPermissions
env: {}
